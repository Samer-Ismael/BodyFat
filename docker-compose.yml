# v3.8: old `docker-compose` (v1) needs `version`; Compose v2 ignores it (harmless warning).
version: "3.8"

services:
  bodyfat-tracker:
    build: .
    image: bodyfat-tracker:local
    ports:
      - "${HOST_PORT:-5070}:5070"
    environment:
      NODE_ENV: production
      PORT: "5070"
      BODYFAT_DB_PATH: /data/bodyfat.db
    volumes:
      - bodyfat-data:/data
    restart: unless-stopped
    # http (not fetch): more reliable inside Docker exec on some hosts/NAS.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5070/api/users',(r)=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  bodyfat-data:
    driver: local
